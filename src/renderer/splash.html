<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<!--
  Per-theme BaseWindow background colors. Mirrors W3C `theme-color`:
  Zenbu's main process picks the matching tag based on
  `nativeTheme.shouldUseDarkColors`, so the pre-paint window flash
  matches the splash body. Older zenbu cores fall back to the first
  matching tag (light) — same behavior as before this convention.
-->
<meta name="zenbu-bg" content="#fafafa" media="(prefers-color-scheme: light)">
<meta name="zenbu-bg" content="#09090b" media="(prefers-color-scheme: dark)">
<style>
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    background: #fafafa;
  }
  @media (prefers-color-scheme: dark) {
    html, body {
      background: #09090b;
    }
  }
</style>
</head>
<body></body>
</html>
